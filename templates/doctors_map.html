<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Locations - Map View</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .map-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            height: 600px;
        }

        #doctorMap {
            width: 100%;
            height: 100%;
            border-radius: 15px;
        }

        .doctors-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-height: 600px;
            overflow-y: auto;
        }

        .doctors-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .doctor-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .doctor-card:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .doctor-card.active {
            border-color: #667eea;
            background: #f0f4ff;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .doctor-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .doctor-clinic {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .doctor-info {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .doctor-info strong {
            color: #333;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .info-item i {
            color: #667eea;
            width: 20px;
            margin-right: 10px;
        }

        .map-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .map-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #f0f0f0;
        }

        .stats {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .stats h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .stat-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* Leaflet marker custom styles */
        .leaflet-popup-content {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .popup-content {
            padding: 5px 0;
        }

        .popup-content strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .popup-content p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #666;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .map-container,
            .doctors-list {
                height: auto;
                max-height: none;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .map-container {
                height: 400px;
            }

            .doctors-list {
                max-height: 500px;
            }
        }

        /* Scrollbar styling */
        .doctors-list::-webkit-scrollbar {
            width: 8px;
        }

        .doctors-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .doctors-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .doctors-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-button">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div class="header">
            <h1><i class="fas fa-map-location-dot"></i> Doctor Locations</h1>
            <p>Find dermatologists near you in Belagavi</p>
        </div>

        <div class="stats">
            <h3>Available Doctors</h3>
            <div class="stat-items">
                <div class="stat-item">
                    <div class="stat-value" id="doctorCount">0</div>
                    <div class="stat-label">Total Doctors</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value"><i class="fas fa-hospital"></i></div>
                    <div class="stat-label">Clinics Available</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="map-container">
                <div id="doctorMap"></div>
            </div>

            <div class="doctors-list">
                <h2><i class="fas fa-list"></i> Doctors</h2>
                <div id="doctorsList"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        // Fixed coordinates for Belagavi (Belgaum)
        const belagaviCoords = {
            "Sparsh Skin Hair & Laser Clinic": [15.8691, 75.6234],
            "Ashwini Medical Center": [15.8730, 75.6210],
            "Kutre's Skin Care Centre": [15.8750, 75.6220],
            "Skin care centre": [15.8705, 75.6245],
            "Skinfinite": [15.8720, 75.6225],
            "Mayur Clinic": [15.8715, 75.6240],
            "Cutis Clinic": [15.8740, 75.6205],
            "Patil Clinic": [15.8695, 75.6230],
            "Mangal Clinic": [15.8725, 75.6215]
        };

        let map;
        let markers = [];
        let doctors = [];

        // Initialize map
        function initializeMap() {
            map = L.map('doctorMap').setView([15.8725, 75.6220], 14);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        // Fetch doctors data from API
        async function fetchDoctors() {
            try {
                const response = await fetch('/api/doctors');
                doctors = await response.json();
                displayDoctorsList();
                displayDoctorsOnMap();
                document.getElementById('doctorCount').textContent = doctors.length;
            } catch (error) {
                console.error('Error fetching doctors:', error);
            }
        }

        // Display doctors list in sidebar
        function displayDoctorsList() {
            const listContainer = document.getElementById('doctorsList');
            listContainer.innerHTML = '';

            doctors.forEach((doctor, index) => {
                const card = document.createElement('div');
                card.className = 'doctor-card';
                card.innerHTML = `
                    <div class="doctor-name">${doctor.name}</div>
                    <div class="doctor-clinic">${doctor.clinic}</div>
                    <div class="doctor-info">
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${doctor.address}</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-phone"></i>
                            <a href="tel:${doctor.phone}" style="color: inherit; text-decoration: none;">${doctor.phone}</a>
                        </div>
                    </div>
                    <a href="${doctor.jio_location}" target="_blank" class="map-link">
                        <i class="fas fa-directions"></i> Get Directions
                    </a>
                `;

                card.addEventListener('click', () => {
                    // Remove active class from all cards
                    document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // Center map on doctor location
                    const coords = belagaviCoords[doctor.clinic];
                    if (coords) {
                        map.setView(coords, 16);
                        markers[index].openPopup();
                    }
                });

                listContainer.appendChild(card);
            });
        }

        // Display doctors on map
        function displayDoctorsOnMap() {
            doctors.forEach((doctor, index) => {
                const coords = belagaviCoords[doctor.clinic];
                if (coords) {
                    const marker = L.marker(coords).addTo(map);
                    
                    const popupContent = `
                        <div class="popup-content">
                            <strong>${doctor.name}</strong>
                            <p><strong>Clinic:</strong> ${doctor.clinic}</p>
                            <p><strong>Address:</strong> ${doctor.address}</p>
                            <p><strong>Phone:</strong> <a href="tel:${doctor.phone}">${doctor.phone}</a></p>
                            <p style="margin-top: 10px;">
                                <a href="${doctor.jio_location}" target="_blank" style="color: #667eea; text-decoration: none; font-weight: 600;">
                                    <i class="fas fa-directions"></i> View on Maps
                                </a>
                            </p>
                        </div>
                    `;
                    
                    marker.bindPopup(popupContent);
                    marker.on('click', () => {
                        // Highlight the corresponding card
                        document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('active'));
                        document.querySelectorAll('.doctor-card')[index].classList.add('active');
                        document.querySelectorAll('.doctor-card')[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    });
                    
                    markers.push(marker);
                }
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeMap();
            fetchDoctors();
        });
    </script>
</body>
</html>
